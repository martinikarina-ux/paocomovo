<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Cadastro de Clientes - Frutiger Aero</title>
</head>

<body>
    <div class="container">
        <h1>Cadastro de Clientes</h1>

        <form action="/adicionar" method="POST">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="email" name="email" placeholder="E-mail" required>

            <div class="form-row">
                <div class="input-group">
                    <label>Nascimento:</label>
                    <input type="date" name="data_nasc">
                </div>
                <div class="input-group toggle-group">
                    <label>Status Ativo:</label>
                    <label class="switch">
                        <input type="checkbox" name="status" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-glossy">Cadastrar</button>
        </form>

        <hr>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Nascimento</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for cliente in clientes %}
                <tr>
                    <td>{{ cliente[0] }}</td>
                    <td>{{ cliente[1] }}</td>
                    <td>{{ cliente[2] }}</td>
                    <td>{{ cliente[3] }}</td>
                    <td><span class="status-badge {{ 'active' if cliente[4] == 'Ativo' else 'inactive' }}">{{ cliente[4]
                            }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="bubble-container">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>
  <button id="toggle-dark">Alternar Tema</button>

<script>
    const btnDark = document.getElementById('toggle-dark');
    const body = document.body;

    // Verifica se o usuário já tinha escolhido o modo escuro antes
    if (localStorage.getItem('dark-mode') === 'enabled') {
        body.classList.add('dark-mode');
    }

    btnDark.addEventListener('click', () => {
        body.classList.toggle('dark-mode');

        // Salva a preferência no navegador
        if (body.classList.contains('dark-mode')) {
            localStorage.setItem('dark-mode', 'enabled');
        } else {
            localStorage.setItem('dark-mode', 'disabled');
        }
    });
 </script>
 <script src="{{ url_for('static', filename='js/script.js') }}"></script>

 

</body>

</html>
